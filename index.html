<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" sizes="32x32" href="assets/images/favicon-32x32.png">
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/responsive.css">
  <title>Frontend Mentor | NFT preview card component</title>
</head>

<body>
  <main class="container">
    <div class="card">
      <div class="image-container">
        <img class="ethereum-img" src="assets/images/image-equilibrium.jpg" alt="image equilibrium">
        <div class="overlay">
          <img src="assets/images/icon-view.svg" alt="view icon">
        </div>
      </div>
      <div class="content">
        <h1 class="title">
          Equilibrium #3429
        </h1>

        <h2 class="description">Our Equilibrium collection promotes balance and calm.</h2>

        <div class="value-time">
          <div class="ethereum-info">
            <img src="assets/images/icon-ethereum.svg" alt="icon ethereum">
            <span>0.041 ETH</span>
          </div>

          <div class="time-remaining">
            <img src="assets/images/icon-clock.svg" alt="clock icon">
            <span>3 days left</span>
          </div>
        </div>
      </div>

      <hr class="content-line">

      <div class="creator-profile">
        <img src="assets/images/image-avatar.png" alt="Jules Wyvern Avatar">
        <p>Creation of <span class="creator">Jules Wyvern</span></p>
      </div>
    </div>
  </main>

</body>

</html>
